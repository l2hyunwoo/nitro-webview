name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            native:
              - 'src/**'
              - 'cpp/**'
              - 'ios/**'
              - 'android/**'
              - 'nitrogen/**'
              - 'nitro.json'
              - 'example/**'
              - 'package.json'
              - 'yarn.lock'
              - '.github/workflows/ci.yml'

  validate:
    name: Validate (lint, typecheck, prepare, TS tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint (ESLint, --max-warnings 0)
        run: yarn lint-ci

      - name: Typecheck (tsc --noEmit)
        run: yarn typecheck

      - name: Build library (yarn prepare)
        run: yarn prepare

      - name: Run host TS tests (node --test)
        run: yarn test

  swift-test:
    name: Swift tests (XCTest)
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies (root)
        run: yarn install --immutable

      - name: Build library (yarn prepare - tsc + nitrogen)
        run: yarn prepare

      - name: Run Swift tests
        run: yarn test:ios-native

  robolectric:
    name: Android unit tests (Robolectric)
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies (root)
        run: yarn install --immutable

      - name: Build library (yarn prepare - tsc + nitrogen)
        run: yarn prepare

      - name: Install dependencies (example)
        working-directory: example
        run: yarn install --immutable

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Robolectric suite
        working-directory: example/android
        run: ./gradlew :nitro-webview:testDebugUnitTest --no-daemon --build-cache

      - name: Stop Gradle daemon
        if: always()
        working-directory: example/android
        run: ./gradlew --stop

  build-android:
    name: Example app compile (Android assembleDebug)
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies (root)
        run: yarn install --immutable

      - name: Build library (yarn prepare - tsc + nitrogen)
        run: yarn prepare

      - name: Install dependencies (example)
        working-directory: example
        run: yarn install --immutable

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Assemble debug APK
        working-directory: example/android
        run: ./gradlew :app:assembleDebug --no-daemon --build-cache

      - name: Stop Gradle daemon
        if: always()
        working-directory: example/android
        run: ./gradlew --stop

  build-ios:
    name: Example app compile (iOS simulator)
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Ruby (bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          # Gemfile only has a range constraint (>= 2.6.10), so setup-ruby
          # cannot infer a version and fails without an explicit one.
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: example

      - name: Install dependencies (root)
        run: yarn install --immutable

      - name: Build library (yarn prepare - tsc + nitrogen)
        run: yarn prepare

      - name: Install dependencies (example)
        working-directory: example
        run: yarn install --immutable

      - name: Pods cache
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: example/ios
        run: bundle exec pod install

      - name: Compile app (xcodebuild, no code signing)
        working-directory: example/ios
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace example.xcworkspace \
            -scheme example \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
